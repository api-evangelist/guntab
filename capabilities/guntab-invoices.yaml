naftiko: 1.0.0-alpha2
info:
  label: GunTab REST API — Invoices
  description: 'GunTab REST API — Invoices. 6 operations. Lead operation: Create an invoice. Self-contained Naftiko capability
    covering one Guntab business surface.'
  tags:
  - Guntab
  - Invoices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GUNTAB_API_KEY: GUNTAB_API_KEY
capability:
  consumes:
  - type: http
    namespace: guntab-invoices
    baseUri: https://api.guntab.com/v1
    description: GunTab REST API — Invoices business capability. Self-contained, no shared references.
    resources:
    - name: invoices
      path: /invoices
      operations:
      - name: createinvoice
        method: POST
        description: Create an invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: invoices-id
      path: /invoices/{id}
      operations:
      - name: readinvoice
        method: GET
        description: Read an invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invoices-id-cancels
      path: /invoices/{id}/cancels
      operations:
      - name: cancelinvoice
        method: POST
        description: Cancel an invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invoices-id-fulfillments
      path: /invoices/{id}/fulfillments
      operations:
      - name: fulfillinvoice
        method: POST
        description: Fulfill an invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: invoices-id-platform_confirmations
      path: /invoices/{id}/platform_confirmations
      operations:
      - name: platformconfirminvoice
        method: POST
        description: Confirm an invoice as the platform
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invoices-id-seller_confirmations
      path: /invoices/{id}/seller_confirmations
      operations:
      - name: sellerconfirminvoice
        method: POST
        description: Confirm an invoice as the seller
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.GUNTAB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: guntab-invoices-rest
    port: 8080
    description: REST adapter for GunTab REST API — Invoices. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/invoices
      name: invoices
      description: REST surface for invoices.
      operations:
      - method: POST
        name: createinvoice
        description: Create an invoice
        call: guntab-invoices.createinvoice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{id}
      name: invoices-id
      description: REST surface for invoices-id.
      operations:
      - method: GET
        name: readinvoice
        description: Read an invoice
        call: guntab-invoices.readinvoice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{id}/cancels
      name: invoices-id-cancels
      description: REST surface for invoices-id-cancels.
      operations:
      - method: POST
        name: cancelinvoice
        description: Cancel an invoice
        call: guntab-invoices.cancelinvoice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{id}/fulfillments
      name: invoices-id-fulfillments
      description: REST surface for invoices-id-fulfillments.
      operations:
      - method: POST
        name: fulfillinvoice
        description: Fulfill an invoice
        call: guntab-invoices.fulfillinvoice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{id}/platform-confirmations
      name: invoices-id-platform-confirmations
      description: REST surface for invoices-id-platform_confirmations.
      operations:
      - method: POST
        name: platformconfirminvoice
        description: Confirm an invoice as the platform
        call: guntab-invoices.platformconfirminvoice
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{id}/seller-confirmations
      name: invoices-id-seller-confirmations
      description: REST surface for invoices-id-seller_confirmations.
      operations:
      - method: POST
        name: sellerconfirminvoice
        description: Confirm an invoice as the seller
        call: guntab-invoices.sellerconfirminvoice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: guntab-invoices-mcp
    port: 9090
    transport: http
    description: MCP adapter for GunTab REST API — Invoices. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-invoice
      description: Create an invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: guntab-invoices.createinvoice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-invoice
      description: Read an invoice
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guntab-invoices.readinvoice
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-invoice
      description: Cancel an invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: guntab-invoices.cancelinvoice
      outputParameters:
      - type: object
        mapping: $.
    - name: fulfill-invoice
      description: Fulfill an invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: guntab-invoices.fulfillinvoice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: confirm-invoice-platform
      description: Confirm an invoice as the platform
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: guntab-invoices.platformconfirminvoice
      outputParameters:
      - type: object
        mapping: $.
    - name: confirm-invoice-seller
      description: Confirm an invoice as the seller
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: guntab-invoices.sellerconfirminvoice
      outputParameters:
      - type: object
        mapping: $.
